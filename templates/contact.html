{% extends "base.html" %}
{% block title %}Contact · Futsum Blog{% endblock %}

{% block content %}
<section class="hero mb-4" style="background-image: url('https://images.unsplash.com/photo-1516321497487-e288fb19713f?auto=format&fit=crop&w=1400&q=80');">
  <div class="container py-5">
    <h1 class="display-6 mb-1">Contact Me</h1>
    <p class="lead mb-0">Questions, ideas, or collaboration opportunities.</p>
  </div>
</section>

<div class="container">
  <div class="row justify-content-center">
    <div class="col-lg-8">
      <div class="card border-0 shadow-sm">
        <div class="card-body p-4">
          <p class="text-body-secondary">Send a message and I will get back to you as soon as possible.</p>
          <form action="{{ url_for('main.contact') }}" method="post" id="contactForm" novalidate>
            <div class="mb-3">
              <label class="form-label" for="name">Name</label>
              <input type="text" class="form-control" id="name" name="name" placeholder="Your name" required>
            </div>
            <div class="mb-3">
              <label class="form-label" for="email">Email Address</label>
              <input type="email" class="form-control" id="email" name="email" placeholder="you@example.com" required>
            </div>
            <div class="mb-3">
              <label class="form-label" for="phone">Phone Number</label>
              <input type="tel" class="form-control" id="phone" name="phone" placeholder="+251 ...">
            </div>
            <div class="mb-3">
              <label class="form-label" for="message">Message</label>
              <textarea rows="5" class="form-control" id="message" name="message" placeholder="Write your message..." required></textarea>
            </div>
            <button type="submit" class="btn btn-primary">Send Message</button>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
